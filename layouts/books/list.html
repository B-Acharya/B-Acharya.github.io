{{ define "title" }}bacharya@web:~/{{ .Section }}{{ end }}

{{ define "main" }}
<!-- Page Header -->
<div class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>

    <!-- Command Prompt -->
    <div class="terminal-prompt" style="margin-top: 1rem; margin-bottom: 2rem;">
        <div class="terminal-prompt-line">
            <span class="prompt-text">bacharya@web:~$</span>
            <span class="text-on-surface">ls /{{ .Section }}</span>
            <span class="cursor-blink"></span>
        </div>
    </div>
    <div class="page-meta">
        <p>9 ITEMS TOTAL</p>
        <div style="text-align: right;">
            <p class="text-secondary">[BOOKS]</p>
            <p>MODE: LIST_VIEW</p>
        </div>
    </div>
</div>

<!-- Content -->
<div class="content-prose">
    {{ .Content }}
</div>

{{ end }}
